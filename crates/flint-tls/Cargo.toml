[package]
name = "flint-tls"
description = "Chrome-mimicry TLS: the boring Chrome-ClientHello connector, the gambit CH genome, JA4."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []
# The boring2 Chrome-mimicry connector (and its JA4 anchor/drift test). Off by default so the base
# build stays free of the C/cmake BoringSSL build; `gambit`, `profile`, and `ja4` are pure and always
# compiled. The update-mimicry workflow bumps boring2/tokio-boring2 to track Chrome, then runs the
# anchor test under this feature to catch fingerprint drift.
# `boring-sys2` (the raw FFI) is pulled in so the connector can run the `legacy_session_id`-injection
# (`kID`) recipe, which boring2 exposes no high-level API for; `foreign-types-shared` brings the
# `ForeignTypeRef::as_ptr` method on boring2's `SslRef` into scope. `tracing` lets the gambit-knob
# appliers warn-and-skip an id boring can't realize (connectivity must never depend on a knob).
boring = [
    "dep:boring2",
    "dep:boring-sys2",
    "dep:tokio-boring2",
    "dep:tokio",
    "dep:foreign-types-shared",
    "dep:tracing",
]

[dependencies]
# gambit's Layer C reuses flint-shaping's WirePlan/SegmentSplit/DelaySpec (the genome ‚Üî shaper bridge).
flint-shaping = { path = "../flint-shaping" }
# Ed25519 (gambit SignedGambit) + SHA-256 (ja4). Locked stack: ring.
ring = { workspace = true }
serde = { workspace = true }
postcard = { workspace = true }
thiserror = { workspace = true }

# Boring connector only (feature `boring`). tokio here is just the IO traits the connector is generic
# over ‚Äî no runtime features needed for the lib. boring2 features (match spark): `pq-experimental`
# for the X25519MLKEM768 group, `cert-compression` for brotli cert compression ‚Äî both part of the
# Chrome-137 fingerprint.
boring2 = { workspace = true, optional = true, features = ["pq-experimental", "cert-compression"] }
tokio-boring2 = { workspace = true, optional = true }
tokio = { version = "1", default-features = false, optional = true }
# Raw BoringSSL FFI for the `legacy_session_id` (`kID`) injection ‚Äî pinned to the SAME version as
# boring2 (4.15.x) so they share one BoringSSL build. `foreign-types-shared` provides the
# `ForeignTypeRef` trait whose `as_ptr` we call on boring2's `SslRef` (boring2 uses foreign-types 0.5
# ‚áí shared 0.3).
boring-sys2 = { workspace = true, optional = true }
foreign-types-shared = { version = "0.3", optional = true }
tracing = { workspace = true, optional = true }

[dev-dependencies]
# `#[tokio::test]` for the boring anchor-capture test (only built under `--features boring`).
tokio = { version = "1", default-features = false, features = ["macros", "rt"] }
